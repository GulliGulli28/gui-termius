[advisories]
ignore = [
    # rsa 0.10.0-rc.18, pulled in transitively by russh/ssh-key for private-key
    # auth. "Marvin Attack" timing side-channel — no fix published upstream as
    # of 2026-07. Exploiting it requires an attacker able to measure local
    # decryption timing against attacker-chosen ciphertexts, which doesn't
    # apply to gui-termius acting as an SSH client. Revisit when russh/rsa
    # ships a fix: https://rustsec.org/advisories/RUSTSEC-2023-0071
    "RUSTSEC-2023-0071",

    # quick-xml 0.39.4, pulled in transitively via tauri-utils -> plist, used
    # only at build time to read/write macOS Info.plist metadata (not part of
    # the Windows runtime path). Both DoS advisories require parsing untrusted
    # XML, which we never do with this dependency. Revisit when tauri-utils
    # bumps its `plist` requirement: https://rustsec.org/advisories/RUSTSEC-2026-0194
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]
