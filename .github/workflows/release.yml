name: Release

# Builds the Windows and Linux installers and publishes them as a draft
# GitHub Release whenever a `v*` tag is pushed (or manually via the Actions
# tab). The in-app updater checks the latest published release's
# `latest.json`, so publishing the draft is what makes an update visible to
# users. Both platform jobs target the same tag/release: tauri-action
# creates the draft on the first job to finish and appends assets from the
# other, so which one runs first doesn't matter.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          # ubuntu-22.04, not ubuntu-latest (24.04): the .deb/.rpm/AppImage
          # link against the runner's glibc, and 24.04's is too new for
          # older user systems to run the resulting binary.
          - platform: ubuntu-22.04
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      # aws-lc-sys/ring (rdp-sidecar's TLS stack) need NASM to build their
      # assembly routines under MSVC — not reliably present on windows-latest
      # (checked the current runner image's software manifest: no NASM listed
      # as of the Windows Server 2025/VS2026 image windows-latest now points
      # to), so install it explicitly rather than assume. No-op on Linux.
      - uses: ilammy/setup-nasm@v1

      # rdp-sidecar is its own separate Cargo workspace (see rdp-sidecar/Cargo.toml
      # and CLAUDE.md's "RDP intégré : architecture sidecar" section) — the root
      # `cargo build --workspace` never touches it, and tauri-action's `tauri build`
      # doesn't know how to build it either. It has to be built and placed at
      # `src-tauri/binaries/rdp-sidecar-<host-triple>[.exe]` ourselves, before
      # tauri-action runs, or the build fails outright: tauri-build's build.rs
      # checks `bundle.externalBin` paths exist even to just compile the main crate.
      - name: Build rdp-sidecar and stage it for bundling (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          cd rdp-sidecar && cargo build --release
          mkdir -p ../src-tauri/binaries
          cp target/release/rdp-sidecar.exe ../src-tauri/binaries/rdp-sidecar-x86_64-pc-windows-msvc.exe

      - name: Build rdp-sidecar and stage it for bundling (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          cd rdp-sidecar && cargo build --release
          mkdir -p ../src-tauri/binaries
          cp target/release/rdp-sidecar ../src-tauri/binaries/rdp-sidecar-x86_64-unknown-linux-gnu

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "gui-termius ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
