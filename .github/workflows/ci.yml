name: CI

# Runs on every push and pull request: catches regressions before they reach
# a release tag (release.yml only builds/publishes, it never runs a test).
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  core:
    # termius-core is pure Rust (no Tauri/webkit), so it builds and tests
    # fine on the default Linux runner — fast feedback loop.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy (termius-core)
        run: cargo clippy -p termius-core --all-targets -- -D warnings

      - name: Test (termius-core)
        run: cargo test -p termius-core --all-targets

  windows-workspace:
    # Full workspace (including the Tauri binary) mirrors release.yml's
    # environment, since Tauri needs WebView2 which ships on windows-latest.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test (workspace)
        run: cargo test --workspace

      - name: Build (workspace)
        run: cargo build --workspace

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
