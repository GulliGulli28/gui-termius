name: CI

# Runs on every push and pull request: catches regressions before they reach
# a release tag (release.yml only builds/publishes, it never runs a test).
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  core:
    # termius-core is pure Rust (no Tauri/webkit), so it builds and tests
    # fine on the default Linux runner — fast feedback loop.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          # rdp-sidecar is its own separate Cargo workspace (own Cargo.lock —
          # see CLAUDE.md's "Pourquoi un processus RDP séparé"), so it needs
          # its own cache entry; the default only picks up the root workspace.
          workspaces: |
            . -> target
            rdp-sidecar -> target

      # The integration tests spawn a real sshd (core/tests/common/mod.rs) to
      # talk to over a loopback connection; ubuntu-latest doesn't ship it.
      - name: Install openssh-server
        run: sudo apt-get update && sudo apt-get install -y openssh-server

      - name: Clippy (termius-core)
        run: cargo clippy -p termius-core --all-targets -- -D warnings

      - name: Test (termius-core)
        run: cargo test -p termius-core --all-targets

      # Cheap, fast (no WebView2/Windows overhead) Linux-side coverage for
      # rdp-sidecar's cross-platform code (StubClipboard, no `#[cfg(windows)]`
      # branches) — `--workspace` above never touches this crate at all since
      # it's a separate workspace on purpose. Not a substitute for the
      # Windows-side check in `windows-workspace` (the `WinClipboard`/`ring`+
      # NASM path only compiles there), but catches most regressions faster.
      - name: Clippy (rdp-sidecar)
        run: cd rdp-sidecar && cargo clippy --all-targets -- -D warnings

      - name: Test (rdp-sidecar)
        run: cd rdp-sidecar && cargo test --all-targets

  core-macos:
    # macOS coverage for termius-core + rdp-sidecar, mirroring the `core` job
    # above — no full Tauri/webview build here (that's `windows-workspace`'s
    # job, mirroring release.yml's packaging environment): release.yml
    # doesn't currently ship a macOS build at all, so a full macOS Tauri
    # build/package isn't attempted here either, only kept in scope for a
    # possible later addition. This job exists to catch macOS-specific Rust
    # portability regressions early, same reasoning as `core` for Linux.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          # rdp-sidecar is its own separate Cargo workspace (own Cargo.lock —
          # see CLAUDE.md's "Pourquoi un processus RDP séparé"), so it needs
          # its own cache entry; the default only picks up the root workspace.
          workspaces: |
            . -> target
            rdp-sidecar -> target

      # Unlike ubuntu-latest, the macOS runner image ships /usr/sbin/sshd and
      # ssh-keygen as part of the base OS — core/tests/common/mod.rs spawns
      # sshd directly as a subprocess (not via the "Remote Login" service),
      # so no install step is needed here the way `core`'s Linux job needs
      # `apt-get install openssh-server`.
      - name: Clippy (termius-core)
        run: cargo clippy -p termius-core --all-targets -- -D warnings

      - name: Test (termius-core)
        run: cargo test -p termius-core --all-targets

      - name: Clippy (rdp-sidecar)
        run: cd rdp-sidecar && cargo clippy --all-targets -- -D warnings

      - name: Test (rdp-sidecar)
        run: cd rdp-sidecar && cargo test --all-targets

  windows-workspace:
    # Full workspace (including the Tauri binary) mirrors release.yml's
    # environment, since Tauri needs WebView2 which ships on windows-latest.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          # rdp-sidecar is its own separate Cargo workspace (own Cargo.lock —
          # see CLAUDE.md's "Pourquoi un processus RDP séparé"), so it needs
          # its own cache entry; the default only picks up the root workspace.
          workspaces: |
            . -> target
            rdp-sidecar -> target

      - name: Install frontend dependencies
        run: npm ci

      # aws-lc-sys/ring (rdp-sidecar's TLS stack) need NASM to build their
      # assembly routines under MSVC — not reliably present on windows-latest
      # (checked the current runner image's software manifest: no NASM listed
      # as of the Windows Server 2025/VS2026 image windows-latest now points
      # to), so install it explicitly rather than assume.
      - uses: ilammy/setup-nasm@v1

      # rdp-sidecar is its own separate Cargo workspace — the root
      # `cargo clippy/build --workspace` below never touches it, and
      # tauri-build's build.rs checks `bundle.externalBin` paths exist even
      # just to compile the main crate (not only to package it), so every
      # step below needs this binary in place first or they all fail outright
      # with "resource path ... doesn't exist". Mirrors release.yml's
      # equivalent step (which builds `--release`, for packaging); this one
      # builds debug to match this job's own `cargo build --workspace` below.
      - name: Build rdp-sidecar and stage it for bundling
        shell: bash
        run: |
          cd rdp-sidecar && cargo build
          mkdir -p ../src-tauri/binaries
          cp target/debug/rdp-sidecar.exe ../src-tauri/binaries/rdp-sidecar-x86_64-pc-windows-msvc.exe

      # Windows-side coverage for rdp-sidecar's own code, including the
      # `WinClipboard`/`ring`+NASM path that only compiles on this platform
      # (see CLAUDE.md) — the Linux-side check in the `core` job above is
      # faster but can't reach this code at all.
      - name: Clippy (rdp-sidecar)
        run: cd rdp-sidecar && cargo clippy --all-targets -- -D warnings

      - name: Clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # --lib/--bins only: the core/tests/*integration.rs suites spawn a real
      # /usr/sbin/sshd and read $USER, both Unix-only — they run in the
      # `core` job on Linux instead, not here.
      - name: Test (workspace, unit tests only)
        run: cargo test --workspace --lib --bins

      - name: Build (workspace)
        run: cargo build --workspace

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
